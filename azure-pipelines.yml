trigger:
- main

pool: sample   # your self-hosted agent

steps:
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean compile test'
    mavenOptions: '-Xmx3072m'

    # 👇 THIS is the important part
    javaHomeOption: 'Path'
    jdkDirectory: '/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home'

    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'

# Debug (highly recommended)
- script: |
    echo "JAVA_HOME=$JAVA_HOME"
    java -version
    mvn -version
  displayName: 'Verify Java version'