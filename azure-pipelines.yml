trigger:
- main

pool: sample   # your self-hosted agent

steps:
# Debug: check what Java is currently available
- script: |
    echo "JAVA_HOME=$JAVA_HOME"
    java -version || true
    /usr/libexec/java_home -V || true
  displayName: 'Check installed JDKs'

# Force Java 21 manually (macOS agent)
- script: |
    export JAVA_HOME=$(/usr/libexec/java_home -v 21)
    export PATH=$JAVA_HOME/bin:$PATH
    echo "Using JAVA_HOME=$JAVA_HOME"
    java -version
    mvn -version
    mvn clean compile test
  displayName: 'Build with Java 21'